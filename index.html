<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Music&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --fg: #f0ece4;
    --accent: #c8a46e;
    --accent-light: #e4d5b7;
    --muted: #6e6a62;
    --glass: rgba(240, 236, 228, 0.04);
    --glass-border: rgba(200, 164, 110, 0.12);
  }

  html { font-size: 16px; }

  body {
    background: 
      linear-gradient(135deg, #0a0e1a 0%, #0f1528 30%, #080c18 55%, #111a30 75%, #0a0e1a 100%);
    background-attachment: fixed;
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(30, 60, 140, 0.08) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(30, 50, 120, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain overlay */
  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.75;
  }

  .page {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    min-height: 100vh;
  }

  /* Waveform visualization */
  .waveform {
    width: min(480px, 85vw);
    height: 160px;
    margin-bottom: 1.8rem;
    opacity: 0;
    animation: fadeIn 1.8s ease 0.5s forwards;
  }

  .wordmark {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(4rem, 11vw, 9rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--fg);
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
    text-align: center;
  }
  .tagline {
    font-size: clamp(0.95rem, 1.6vw, 1.15rem);
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
    text-align: center;
  }

  .location {
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 4rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
    text-align: center;
  }

  /* Divider line */
  .divider {
    width: 1px;
    height: 64px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeIn 1.2s ease 1s forwards;
  }

  .notify-text {
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.15s forwards;
  }

  .email-form {
    display: flex;
    align-items: stretch;
    gap: 0;
    max-width: 440px;
    width: 100%;
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    background: var(--glass);
    backdrop-filter: blur(16px);
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 1s ease 1.3s forwards;
    transition: border-color 0.3s ease;
  }
  .email-form:focus-within {
    border-color: var(--accent);
  }

  .email-form input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 300;
    padding: 1rem 1.6rem;
    letter-spacing: 0.01em;
  }
  .email-form input::placeholder {
    color: var(--muted);
    opacity: 0.7;
  }

  .email-form button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: background 0.3s ease;
    white-space: nowrap;
  }
  .email-form button:hover {
    background: var(--accent-light);
  }

  /* Success state */
  .success-msg {
    display: none;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--accent);
    margin-top: 1.2rem;
    animation: fadeUp 0.6s ease forwards;
  }
  .success-msg.show { display: block; }

  /* Footer */
  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
    transition: color 0.3s;
  }
  .footer a:hover { color: var(--accent-light); }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: drift linear infinite;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes drift {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.4; }
    90% { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }

  @media (max-width: 520px) {
    .email-form {
      flex-direction: column;
      border-radius: 20px;
    }
    .email-form input { padding: 1rem 1.4rem; text-align: center; }
    .email-form button { padding: 1rem; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="grain"></div>

<div class="particles" id="particles"></div>

<div class="page">
  <h1 class="wordmark">Melody</h1>
  <canvas class="waveform" id="waveform" width="480" height="160"></canvas>
  <p class="tagline">Intelligence as Sensing</p>
  <p class="location">Los Angeles, CA</p>

  <div class="divider"></div>

  <p class="notify-text">Be the first to know</p>
  <div class="email-form" id="emailForm">
    <input type="email" id="emailInput" placeholder="your@email.com" required />
    <button type="button" id="submitBtn" onclick="handleSubmit()">Notify Me</button>
  </div>
  <p class="success-msg" id="successMsg">Thank you — we'll be in touch.</p>
</div>

<footer class="footer">
  &copy; 2026 Melody &nbsp;&middot;&nbsp; <a href="#">Privacy</a> &nbsp;&middot;&nbsp; <a href="#">Contact</a>
</footer>

<script>
  // Floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }

  // Waveform animation — bio-musical: EKG pulses + neural oscillation + harmonics
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const W = 480, H = 160;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  let time = 0;

  // Music note particles
  const notes = ['♪', '♫', '♩', '♬'];
  const noteParticles = [];
  let lastSpawn = 0;
  let currentRunType = 0; // tracks which cycle we're on for alternating

  function spawnNote(x, y) {
    noteParticles.push({
      x: x,
      y: y,
      startY: y,
      char: notes[Math.floor(Math.random() * notes.length)],
      vx: (Math.random() - 0.5) * 0.6,
      vy: -0.4 - Math.random() * 0.5,
      life: 1,
      decay: 0.004 + Math.random() * 0.004,
      size: 11.5 + Math.random() * 9.2,
      rotation: (Math.random() - 0.5) * 0.4,
      rotSpeed: (Math.random() - 0.5) * 0.02,
    });
  }

  function updateAndDrawNotes() {
    for (let i = noteParticles.length - 1; i >= 0; i--) {
      const n = noteParticles[i];
      n.x += n.vx;
      n.y += n.vy;
      n.vy -= 0.003;
      n.vx *= 0.998;
      n.rotation += n.rotSpeed;
      n.life -= n.decay;
      if (n.life <= 0) { noteParticles.splice(i, 1); continue; }

      const alpha = n.life * 0.7;
      ctx.save();
      ctx.translate(n.x, n.y);
      ctx.rotate(n.rotation);
      ctx.font = `${n.size}px serif`;
      ctx.fillStyle = `rgba(200, 164, 110, ${alpha})`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.char, 0, 0);
      ctx.restore();
    }
  }

  // --- Biomarker molecule structures (skeletal formulas) ---
  // Each molecule: { name, bonds: [[x1,y1,x2,y2], ...], labels: [[x,y,text], ...] }
  // Coordinates normalized around center (0,0), scale ~10-15px range

  const molecules = [
    { // Dopamine
      name: 'dopamine',
      bonds: [
        [-8,-5, -4,-9], [-4,-9, 2,-9], [2,-9, 6,-5], [6,-5, 4,-1], [4,-1, -2,-1], [-2,-1, -8,-5],
        [-5,-8, -1,-8], [5,-3, 3,-1],
        [-8,-5, -12,-3], [6,-5, 10,-3],
        [-2,-1, -2,5], [-2,5, 2,9],
      ],
      labels: []
    },
    { // Serotonin
      name: 'serotonin',
      bonds: [
        [-8,-4, -4,-8], [-4,-8, 2,-8], [2,-8, 5,-4], [5,-4, 3,0], [3,0, -3,0], [-3,0, -8,-4],
        [5,-4, 9,-2], [9,-2, 8,3], [8,3, 4,3], [4,3, 3,0],
        [-5,-7, -1,-7], [7,-1, 7,2],
        [-8,-4, -12,-2],
        [8,3, 10,7], [10,7, 13,10],
        [9,-2, 12,-3],
      ],
      labels: []
    },
    { // Adrenaline
      name: 'adrenaline',
      bonds: [
        [-8,-5, -4,-9], [-4,-9, 2,-9], [2,-9, 6,-5], [6,-5, 4,-1], [4,-1, -2,-1], [-2,-1, -8,-5],
        [-5,-8, -1,-8], [5,-3, 3,-1],
        [-8,-5, -12,-3], [6,-5, 10,-3],
        [-2,-1, -2,4], [-2,4, 2,7],
        [-2,4, -6,6],
        [2,7, 5,10],
      ],
      labels: []
    },
    { // Glucose
      name: 'glucose',
      bonds: [
        [-6,-5, -2,-8], [-2,-8, 4,-8], [4,-8, 7,-4], [7,-4, 4,0], [4,0, -2,0], [-2,0, -6,-5],
        [-2,-8, -2,-12], [4,-8, 6,-12], [7,-4, 11,-4], [4,0, 4,4],
        [-6,-5, -10,-3],
      ],
      labels: []
    },
    { // Cortisol — steroid skeleton
      name: 'cortisol',
      bonds: [
        [-12,-2, -9,-6], [-9,-6, -4,-6], [-4,-6, -1,-2], [-1,-2, -4,2], [-4,2, -9,2], [-9,2, -12,-2],
        [-1,-2, 2,-6], [2,-6, 7,-6], [7,-6, 10,-2], [10,-2, 7,2], [7,2, -1,2], [-1,2, -1,-2],
        [10,-2, 13,1], [13,1, 11,5], [11,5, 7,4], [7,4, 7,2],
        [-10,-5, -6,-5],
        [-12,-2, -15,0],
      ],
      labels: []
    },
    { // Melatonin
      name: 'melatonin',
      bonds: [
        [-7,-4, -3,-7], [-3,-7, 3,-7], [3,-7, 6,-4], [6,-4, 4,0], [4,0, -2,0], [-2,0, -7,-4],
        [6,-4, 10,-2], [10,-2, 9,3], [9,3, 5,3], [5,3, 4,0],
        [-4,-6, 0,-6], [8,-1, 8,2],
        [-7,-4, -11,-2], [-11,-2, -14,0],
        [9,3, 11,7], [11,7, 9,10], [9,10, 11,13],
        [10,-2, 13,-3],
      ],
      labels: []
    },
    { // ATP
      name: 'ATP',
      bonds: [
        [-4,-6, 0,-9], [0,-9, 5,-7], [5,-7, 5,-3], [5,-3, 0,-1], [0,-1, -4,-3], [-4,-3, -4,-6],
        [5,-7, 9,-6], [9,-6, 10,-2], [10,-2, 7,-1], [7,-1, 5,-3],
        [0,-9, 0,-13],
        [10,-2, 13,1],
        [13,1, 13,5], [13,5, 13,9],
      ],
      labels: []
    },
  ];

  // Molecule particle system
  const molParticles = [];
  let lastMolSpawn = 0;

  function spawnMolecule(x, y) {
    const mol = molecules[Math.floor(Math.random() * molecules.length)];
    molParticles.push({
      x: x,
      y: y,
      mol: mol,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -0.25 - Math.random() * 0.35,
      life: 1,
      decay: 0.002 + Math.random() * 0.002,
      scale: 0.72 + Math.random() * 0.33,
      rotation: (Math.random() - 0.5) * 0.3,
      rotSpeed: (Math.random() - 0.5) * 0.008,
    });
  }

  function updateAndDrawMolecules() {
    for (let i = molParticles.length - 1; i >= 0; i--) {
      const m = molParticles[i];
      m.x += m.vx;
      m.y += m.vy;
      m.vy -= 0.002;
      m.vx *= 0.998;
      m.rotation += m.rotSpeed;
      m.life -= m.decay;
      if (m.life <= 0) { molParticles.splice(i, 1); continue; }

      const alpha = m.life * 0.6;
      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(m.rotation);
      ctx.scale(m.scale, m.scale);

      ctx.strokeStyle = `rgba(200, 164, 110, ${alpha})`;
      ctx.lineWidth = 1.2 / m.scale;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      m.mol.bonds.forEach(b => {
        ctx.beginPath();
        ctx.moveTo(b[0], b[1]);
        ctx.lineTo(b[2], b[3]);
        ctx.stroke();
      });

      const vertices = new Set();
      m.mol.bonds.forEach(b => {
        vertices.add(`${b[0]},${b[1]}`);
        vertices.add(`${b[2]},${b[3]}`);
      });
      ctx.fillStyle = `rgba(200, 164, 110, ${alpha * 0.6})`;
      vertices.forEach(v => {
        const [vx, vy] = v.split(',').map(Number);
        ctx.beginPath();
        ctx.arc(vx, vy, 1.0 / m.scale, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }
  }

  // Multiple voice melody shapes — each voice has its own character
  const voices = [
    { // Soprano — high, lyrical, leading voice
      freq1: 0.022, freq2: 0.038, freq3: 0.055,
      speed1: 0.45, speed2: -0.3, speed3: 0.7,
      amp1: 0.5, amp2: 0.3, amp3: 0.15,
      offset: -0.35, // sits high on staff
      color: 'rgba(200, 164, 110, 0.8)',
      fadeColor: 'rgba(200, 164, 110, 0.15)',
      width: 2,
    },
    { // Alto — mid-range, warm, counter-melody
      freq1: 0.018, freq2: 0.03, freq3: 0.045,
      speed1: -0.35, speed2: 0.5, speed3: -0.2,
      amp1: 0.4, amp2: 0.25, amp3: 0.2,
      offset: 0.05, // sits near middle
      color: 'rgba(200, 164, 110, 0.45)',
      fadeColor: 'rgba(200, 164, 110, 0.08)',
      width: 1.5,
    },
    { // Bass — low, slow, grounding
      freq1: 0.012, freq2: 0.02, freq3: 0.035,
      speed1: 0.2, speed2: -0.15, speed3: 0.35,
      amp1: 0.35, amp2: 0.2, amp3: 0.1,
      offset: 0.4, // sits low on staff
      color: 'rgba(240, 236, 228, 0.25)',
      fadeColor: 'rgba(240, 236, 228, 0.06)',
      width: 1.2,
    },
  ];

  function voiceAt(v, x, t) {
    const raw = Math.sin(x * v.freq1 + t * v.speed1) * v.amp1
              + Math.sin(x * v.freq2 + t * v.speed2) * v.amp2
              + Math.sin(x * v.freq3 + t * v.speed3) * v.amp3;
    return raw + v.offset;
  }

  // Draw treble clef using the Unicode musical symbol
  function drawTrebleClef(x, y, size) {
    ctx.save();
    ctx.font = `${size}px 'Noto Music', serif`;
    ctx.fillStyle = 'rgba(200, 164, 110, 0.5)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1D11E}', x, y);
    ctx.restore();
  }

  function drawBioWave(t) {
    const mid = H * 0.5;
    const staffHeight = 60;
    const staffTop = mid - staffHeight / 2;
    const lineGap = staffHeight / 4;
    const clefMargin = 55; // space for treble clef
    const rightMargin = 20;
    const staffW = W - clefMargin - rightMargin;
    const staffLeft = clefMargin;

    // --- Treble clef ---
    drawTrebleClef(staffLeft - 18, mid + 2, 36);

    // --- Staff lines ---
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = 'rgba(200, 164, 110, 0.18)';
    for (let i = 0; i < 5; i++) {
      const ly = staffTop + i * lineGap;
      ctx.beginPath();
      ctx.moveTo(staffLeft, ly);
      ctx.lineTo(staffLeft + staffW, ly);
      ctx.stroke();
    }

    // --- Bar lines ---
    const numBars = 4;
    ctx.strokeStyle = 'rgba(200, 164, 110, 0.14)';
    // Left edge (thicker double bar)
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(staffLeft, staffTop);
    ctx.lineTo(staffLeft, staffTop + staffHeight);
    ctx.stroke();
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(staffLeft + 3, staffTop);
    ctx.lineTo(staffLeft + 3, staffTop + staffHeight);
    ctx.stroke();
    // Inner bar lines
    for (let i = 1; i < numBars; i++) {
      const bx = staffLeft + (i / numBars) * staffW;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(bx, staffTop);
      ctx.lineTo(bx, staffTop + staffHeight);
      ctx.stroke();
    }
    // Right edge (double bar — final barline)
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(staffLeft + staffW - 3, staffTop);
    ctx.lineTo(staffLeft + staffW - 3, staffTop + staffHeight);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(staffLeft + staffW, staffTop);
    ctx.lineTo(staffLeft + staffW, staffTop + staffHeight);
    ctx.stroke();

    // --- Cursor ---
    const cycleDuration = 10.0;
    const cursor = ((t / cycleDuration) % 1);
    const cursorX = staffLeft + cursor * staffW;
    const gapWidth = 18;

    // Track which run we're on for alternating
    currentRunType = Math.floor(t / cycleDuration) % 2; // 0 = notes, 1 = molecules

    // --- Draw each voice ---
    voices.forEach((v, vi) => {
      // Fresh trace
      ctx.beginPath();
      ctx.strokeStyle = v.color;
      ctx.lineWidth = v.width;
      ctx.lineJoin = 'round';
      for (let px = 0; px <= Math.min(cursorX - staffLeft, staffW); px++) {
        const x = staffLeft + px;
        const mel = voiceAt(v, px, t);
        const y = mid + mel * (staffHeight * 0.5);
        if (px === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Faded old trace
      const fadeStartPx = (cursorX - staffLeft) + gapWidth;
      if (fadeStartPx < staffW) {
        ctx.beginPath();
        ctx.strokeStyle = v.fadeColor;
        ctx.lineWidth = v.width * 0.8;
        for (let px = Math.max(0, Math.floor(fadeStartPx)); px <= staffW; px++) {
          const x = staffLeft + px;
          const mel = voiceAt(v, px, t);
          const y = mid + mel * (staffHeight * 0.5);
          if (px === Math.floor(fadeStartPx)) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    });

    // --- Cursor line ---
    if (cursorX > staffLeft && cursorX < staffLeft + staffW) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(200, 164, 110, 0.08)';
      ctx.lineWidth = 1;
      ctx.moveTo(cursorX, staffTop - 4);
      ctx.lineTo(cursorX, staffTop + staffHeight + 4);
      ctx.stroke();

      // Glow dots on each voice at cursor position
      voices.forEach((v, vi) => {
        const mel = voiceAt(v, cursorX - staffLeft, t);
        const cy = mid + mel * (staffHeight * 0.5);

        ctx.beginPath();
        ctx.arc(cursorX, cy, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = v.color;
        ctx.fill();

        if (vi === 0) {
          const glow = ctx.createRadialGradient(cursorX, cy, 0, cursorX, cy, 10);
          glow.addColorStop(0, 'rgba(200, 164, 110, 0.25)');
          glow.addColorStop(1, 'rgba(200, 164, 110, 0)');
          ctx.beginPath();
          ctx.arc(cursorX, cy, 10, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();
        }
      });

      // Spawn particles based on current run type
      const leadMel = voiceAt(voices[0], cursorX - staffLeft, t);
      const leadMelPrev = voiceAt(voices[0], cursorX - staffLeft - 3, t);
      const dir = leadMel - leadMelPrev;

      if (currentRunType === 0) {
        // Notes run
        if (Math.abs(dir) > 0.012 && t - lastSpawn > 0.5) {
          const cy = mid + leadMel * (staffHeight * 0.5);
          spawnNote(cursorX, cy);
          lastSpawn = t;
        }
      } else {
        // Molecules run
        if (Math.abs(dir) > 0.012 && t - lastMolSpawn > 0.8) {
          const cy = mid + leadMel * (staffHeight * 0.5);
          spawnMolecule(cursorX, cy);
          lastMolSpawn = t;
        }
      }
    }

    // Ambient spawns — match current run type
    if (Math.random() < 0.005) {
      const v = voices[Math.floor(Math.random() * voices.length)];
      const nx = staffLeft + Math.random() * staffW;
      const mel = voiceAt(v, nx - staffLeft, t);
      const ny = mid + mel * (staffHeight * 0.5);
      if (currentRunType === 0) {
        spawnNote(nx, ny);
      } else {
        spawnMolecule(nx, ny);
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    time += 0.016;
    drawBioWave(time);
    updateAndDrawNotes();
    updateAndDrawMolecules();
    requestAnimationFrame(animate);
  }
  animate();

  // Form handling
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const form = document.getElementById('emailForm');
    const msg = document.getElementById('successMsg');
    if (input.value && input.validity.valid) {
      fetch('https://script.google.com/macros/s/AKfycbwsXCO1c6bG6QEiUymR4JGh-DIdCcY4F_-W2oVo88hrd2Vp44oJQcanMdeMu1yPkYYt/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ email: input.value })
      });
      form.style.opacity = '0.4';
      form.style.pointerEvents = 'none';
      msg.classList.add('show');
    } else {
      input.style.outline = '1px solid #c8a46e';
      setTimeout(() => input.style.outline = 'none', 1500);
    }
  }

  document.getElementById('emailInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
